---
name: Daily Image Cleanup
on:
  # every day at 01:30am
  schedule:
    - cron: '30 1 * * *'
  # or manually
  workflow_dispatch:
    inputs:
      dry-run:
        description: |-
            Wether to run with dry-run
        type: boolean
        default: false
        required: false
jobs:
  ghcr-cleanup-image:
    name: ghcr cleanup action
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old tags
        uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1.2.0
        with:
          packages: crossplane/provider-nexus
          tags: '*.g*'
          keep-n-tagged: 3
          token: '${{ secrets.GITHUB_TOKEN }}'
          dry-run: ${{ inputs.dry-run }}

      - name: Validate images
        uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1.2.0
        with:
          packages: crossplane/provider-nexus
          token: ${{ secrets.GITHUB_TOKEN }}
          validate: true
          delete-ghost-images: true
          delete-orphaned-images: true
          dry-run: ${{ inputs.dry-run }}
